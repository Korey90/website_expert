<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="teal-hero" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#004d40"/>
      <stop offset="100%" style="stop-color:#00695c"/>
    </linearGradient>
    <linearGradient id="teal-btn" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00897b"/>
      <stop offset="100%" style="stop-color:#00acc1"/>
    </linearGradient>
  </defs>

  <!-- Light background -->
  <rect width="800" height="450" fill="#f0fdfa"/>

  <!-- Navigation -->
  <rect x="0" y="0" width="800" height="58" fill="#ffffff"/>
  <rect x="0" y="58" width="800" height="1" fill="#b2dfdb"/>
  <!-- Cross/Plus logo (dental) -->
  <rect x="36" y="19" width="8" height="20" fill="#00897b" rx="2"/>
  <rect x="30" y="25" width="20" height="8" fill="#00897b" rx="2"/>
  <!-- Logo text -->
  <rect x="62" y="18" width="90" height="10" fill="#004d40" rx="2"/>
  <rect x="62" y="32" width="60" height="7" fill="#004d40" opacity="0.4" rx="1"/>
  <!-- Nav links -->
  <rect x="260" y="24" width="50" height="7" fill="#546e7a" rx="2"/>
  <rect x="326" y="24" width="50" height="7" fill="#546e7a" rx="2"/>
  <rect x="392" y="24" width="60" height="7" fill="#546e7a" rx="2"/>
  <rect x="468" y="24" width="50" height="7" fill="#546e7a" rx="2"/>
  <!-- Book button -->
  <rect x="574" y="14" width="160" height="30" fill="url(#teal-btn)" rx="5"/>
  <rect x="586" y="22" width="136" height="8" fill="#ffffff" rx="2"/>
  <!-- Phone icon area -->
  <rect x="748" y="18" width="20" height="20" fill="none" stroke="#00897b" stroke-width="1.5" rx="10"/>
  <rect x="753" y="24" width="4" height="8" fill="#00897b" rx="1"/>
  <rect x="759" y="24" width="4" height="8" fill="#00897b" rx="1"/>

  <!-- Hero with image split layout -->
  <rect x="0" y="59" width="430" height="200" fill="url(#teal-hero)"/>
  <!-- Tagline/eyebrow -->
  <rect x="36" y="80" width="110" height="6" fill="#80cbc4" rx="2"/>
  <!-- H1 -->
  <rect x="36" y="96" width="310" height="17" fill="#ffffff" rx="3"/>
  <rect x="36" y="119" width="260" height="17" fill="#ffffff" opacity="0.9" rx="3"/>
  <!-- Sub -->
  <rect x="36" y="148" width="290" height="7" fill="#b2dfdb" rx="2"/>
  <rect x="36" y="160" width="250" height="7" fill="#b2dfdb" opacity="0.7" rx="2"/>
  <!-- Buttons -->
  <rect x="36" y="184" width="140" height="32" fill="#ffffff" rx="5"/>
  <rect x="48" y="192" width="116" height="8" fill="#004d40" rx="2"/>
  <rect x="188" y="184" width="120" height="32" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.5)" stroke-width="1" rx="5"/>
  <rect x="200" y="192" width="96" height="8" fill="#ffffff" rx="2"/>

  <!-- Hero image (right half) - dental office photo mockup -->
  <rect x="430" y="59" width="370" height="200" fill="#004d40"/>
  <!-- Simulated photo with overlapping shapes -->
  <rect x="430" y="59" width="370" height="200" fill="#00695c" opacity="0.6"/>
  <ellipse cx="615" cy="140" rx="120" ry="90" fill="#00897b" opacity="0.3"/>
  <ellipse cx="680" cy="100" rx="80" ry="60" fill="#00acc1" opacity="0.2"/>
  <!-- Doctor silhouette suggestion -->
  <ellipse cx="600" cy="85" rx="22" ry="22" fill="#b2dfdb" opacity="0.4"/>
  <rect x="572" y="108" width="56" height="70" fill="#b2dfdb" opacity="0.25" rx="4"/>
  <!-- Medical cross pattern bg -->
  <rect x="460" y="95" width="4" height="20" fill="rgba(255,255,255,0.08)" rx="1"/>
  <rect x="454" y="101" width="16" height="8" fill="rgba(255,255,255,0.08)" rx="1"/>
  <rect x="500" y="75" width="4" height="20" fill="rgba(255,255,255,0.05)" rx="1"/>
  <rect x="494" y="81" width="16" height="8" fill="rgba(255,255,255,0.05)" rx="1"/>
  <!-- "New patients welcome" badge -->
  <rect x="700" y="74" width="88" height="42" fill="#ffffff" rx="6" opacity="0.95"/>
  <rect x="708" y="80" width="72" height="7" fill="#004d40" rx="2"/>
  <rect x="708" y="91" width="60" height="6" fill="#00897b" rx="2"/>
  <rect x="708" y="101" width="50" height="5" fill="#90a4ae" rx="1"/>

  <!-- Trust bar -->
  <rect x="0" y="259" width="800" height="50" fill="#e0f2f1"/>
  <rect x="40" y="272" width="60" height="5" fill="#00695c" rx="2"/>
  <rect x="40" y="281" width="80" height="5" fill="#546e7a" opacity="0.6" rx="2"/>
  <rect x="200" y="272" width="50" height="5" fill="#00695c" rx="2"/>
  <rect x="200" y="281" width="70" height="5" fill="#546e7a" opacity="0.6" rx="2"/>
  <rect x="360" y="272" width="60" height="5" fill="#00695c" rx="2"/>
  <rect x="360" y="281" width="80" height="5" fill="#546e7a" opacity="0.6" rx="2"/>
  <rect x="530" y="272" width="70" height="5" fill="#00695c" rx="2"/>
  <rect x="530" y="281" width="80" height="5" fill="#546e7a" opacity="0.6" rx="2"/>
  <!-- Stars -->
  <rect x="660" y="272" width="8" height="8" fill="#ffb300" rx="1"/>
  <rect x="672" y="272" width="8" height="8" fill="#ffb300" rx="1"/>
  <rect x="684" y="272" width="8" height="8" fill="#ffb300" rx="1"/>
  <rect x="696" y="272" width="8" height="8" fill="#ffb300" rx="1"/>
  <rect x="708" y="272" width="8" height="8" fill="#ffb300" rx="1"/>
  <rect x="660" y="284" width="60" height="4" fill="#546e7a" opacity="0.5" rx="1"/>

  <!-- Services section -->
  <rect x="0" y="309" width="800" height="12" fill="#f0fdfa"/>
  <!-- 3 service cards -->
  <rect x="32" y="325" width="230" height="110" fill="#ffffff" rx="10" stroke="#b2dfdb" stroke-width="1"/>
  <!-- Icon circle -->
  <circle cx="56" cy="349" r="16" fill="#e0f2f1"/>
  <rect x="49" y="342" width="4" height="14" fill="#00897b" rx="1"/>
  <rect x="45" y="346" width="12" height="6" fill="#00897b" rx="1"/>
  <rect x="78" y="342" width="130" height="8" fill="#263238" rx="2"/>
  <rect x="78" y="355" width="160" height="5" fill="#90a4ae" rx="2"/>
  <rect x="78" y="364" width="140" height="5" fill="#90a4ae" opacity="0.6" rx="2"/>
  <rect x="46" y="385" width="110" height="7" fill="#b2dfdb" rx="2"/>
  <rect x="46" y="396" width="90" height="7" fill="#b2dfdb" opacity="0.6" rx="2"/>
  <rect x="46" y="412" width="80" height="14" fill="url(#teal-btn)" rx="4"/>
  <rect x="54" y="417" width="64" height="4" fill="#ffffff" rx="1"/>

  <rect x="285" y="325" width="230" height="110" fill="#ffffff" rx="10" stroke="#b2dfdb" stroke-width="1"/>
  <circle cx="309" cy="349" r="16" fill="#e0f2f1"/>
  <rect x="302" y="342" width="4" height="14" fill="#00897b" rx="1"/>
  <rect x="298" y="346" width="12" height="6" fill="#00897b" rx="1"/>
  <rect x="331" y="342" width="140" height="8" fill="#263238" rx="2"/>
  <rect x="331" y="355" width="160" height="5" fill="#90a4ae" rx="2"/>
  <rect x="331" y="364" width="140" height="5" fill="#90a4ae" opacity="0.6" rx="2"/>
  <rect x="299" y="385" width="110" height="7" fill="#b2dfdb" rx="2"/>
  <rect x="299" y="396" width="90" height="7" fill="#b2dfdb" opacity="0.6" rx="2"/>
  <rect x="299" y="412" width="80" height="14" fill="url(#teal-btn)" rx="4"/>
  <rect x="307" y="417" width="64" height="4" fill="#ffffff" rx="1"/>

  <rect x="538" y="325" width="230" height="110" fill="#ffffff" rx="10" stroke="#b2dfdb" stroke-width="1"/>
  <circle cx="562" cy="349" r="16" fill="#e0f2f1"/>
  <rect x="555" y="342" width="4" height="14" fill="#00897b" rx="1"/>
  <rect x="551" y="346" width="12" height="6" fill="#00897b" rx="1"/>
  <rect x="584" y="342" width="120" height="8" fill="#263238" rx="2"/>
  <rect x="584" y="355" width="160" height="5" fill="#90a4ae" rx="2"/>
  <rect x="584" y="364" width="140" height="5" fill="#90a4ae" opacity="0.6" rx="2"/>
  <rect x="552" y="385" width="110" height="7" fill="#b2dfdb" rx="2"/>
  <rect x="552" y="396" width="90" height="7" fill="#b2dfdb" opacity="0.6" rx="2"/>
  <rect x="552" y="412" width="80" height="14" fill="url(#teal-btn)" rx="4"/>
  <rect x="560" y="417" width="64" height="4" fill="#ffffff" rx="1"/>
</svg>
