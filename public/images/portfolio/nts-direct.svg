  <rect x="32" y="252" width="80" height="13" fill="#1565c0" rx="12"/>
  <rect x="40" y="256" width="64" height="5" fill="#ffffff" rx="2"/>
  <rect x="124" y="252" width="80" height="13" fill="#f5f7fa" stroke="#e0e6ed" stroke-width="1" rx="12"/>
