  <rect x="32" y="16" width="28" height="28" fill="#1565c0" rx="6"/>
  <rect x="38" y="22" width="16" height="4" fill="#ffffff" rx="1"/>
  <rect x="38" y="29" width="10" height="4" fill="#ffffff" opacity="0.7" rx="1"/>
  <rect x="38" y="36" width="14" height="4" fill="#ffffff" opacity="0.4" rx="1"/>
